name: Deploy Stock Movers Pipeline

on:
  push:
    branches:
      - main # runs automatically on every push to main

jobs:
  deploy:
    name: Terraform + Frontend Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out your code ──────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python (for Lambda packaging) ─────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Set up Terraform ─────────────────────────────
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      # ── 4. Configure AWS credentials ────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── 5. Terraform Init ────────────────────────────────
      - name: Terraform Init
        working-directory: infra
        run: terraform init

      # ── 6. Terraform Plan ────────────────────────────────
      - name: Terraform Plan
        working-directory: infra
        run: |
          terraform plan \
            -var="massive_api_key=${{ secrets.MASSIVE_API_KEY }}" \
            -out=tfplan

      # ── 7. Terraform Apply ───────────────────────────────
      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve tfplan

      # ── 8. Deploy frontend to S3 ─────────────────────────
      - name: Deploy frontend to S3
        run: |
          aws s3 sync frontend/ s3://stock-movers-frontend-prod \
            --delete \
            --exclude ".DS_Store"

      # ── 9. Print live URLs ───────────────────────────────
      - name: Print deployment outputs
        working-directory: infra
        run: terraform output
